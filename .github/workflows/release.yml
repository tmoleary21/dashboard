name: Build and attach dists to release

on:
  release:
    types: [published, created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [dashboard, wrapper]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.project }}
        run: npm run build

      - name: Package dist
        working-directory: ${{ matrix.project }}
        run: |
          zip -r "../${{ matrix.project }}-dist.zip" dist
          tar -czf "../${{ matrix.project }}-dist.tar.gz" dist

      - name: Upload dist to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ matrix.project }}-dist.zip" \
            "${{ matrix.project }}-dist.tar.gz" \
            --clobber

  attach-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install.sh to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          sed "1i # Release: ${tag}" "wallmonitor/install.sh" > "install.sh"
          gh release upload "$tag" "install.sh" --clobber
